<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoSpectra | Dashboard</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white dark:bg-[#0B0E11] text-[#1E2329] dark:text-[#EAECEF] min-h-screen transition-colors duration-500 font-sans selection:bg-primary/30">

    <nav class="sticky top-0 z-50 glass border-b border-slate-200 dark:border-slate-800 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3 group cursor-pointer transition-all duration-300">
                <div class="w-14 h-14 rounded-2xl shadow-sm border border-slate-300 dark:border-slate-700 p-[2px] bg-gradient-to-br from-white to-slate-100 dark:from-[#1E2329] dark:to-[#0B0E11] relative">
                    <img src="images/logo.png" alt="Logo" class="w-full h-full object-cover rounded-[14px]">
                </div>
                <h1 class="text-3xl font-black tracking-tight text-slate-900 dark:text-white font-orbitron">CryptoSpectra</h1>
            </div>

            <div class="hidden md:flex items-center gap-8">
                <a href="#/" class="text-sm font-bold nav-link active transition-colors" id="nav-dashboard">Dashboard</a>
                <a href="#/compare" class="text-sm font-bold text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors nav-link" id="nav-compare">Compare</a>
                <a href="#/favorites" class="text-sm font-bold text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors nav-link" id="nav-favorites">Favorites</a>
            </div>

            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="p-2 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                    <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                    <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                </button>
            </div>
        </div>
    </nav>

    <main id="view-container" class="max-w-7xl mx-auto px-6 py-10">
        <div id="view-dashboard" class="animate-in space-y-10">
            <header>
                <h2 class="text-4xl font-extrabold text-slate-900 dark:text-white mb-2 font-orbitron">Market Trends</h2>
                <p class="text-slate-500 dark:text-slate-400 font-medium">Track and analyze over 100 top cryptocurrencies in real-time.</p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="global-stats-grid">
                <div class="glass p-6 rounded-3xl animate-pulse">
                    <div class="h-4 bg-slate-200 dark:bg-[#2B3139] rounded w-1/2 mb-4"></div>
                    <div class="h-8 bg-slate-200 dark:bg-[#2B3139] rounded w-3/4"></div>
                </div>
                <div class="glass p-6 rounded-3xl animate-pulse">
                    <div class="h-4 bg-slate-200 dark:bg-[#2B3139] rounded w-1/2 mb-4"></div>
                    <div class="h-8 bg-slate-200 dark:bg-[#2B3139] rounded w-3/4"></div>
                </div>
                <div class="glass p-6 rounded-3xl animate-pulse">
                    <div class="h-4 bg-slate-200 dark:bg-[#2B3139] rounded w-1/2 mb-4"></div>
                    <div class="h-8 bg-slate-200 dark:bg-[#2B3139] rounded w-3/4"></div>
                </div>
                <div class="glass p-6 rounded-3xl animate-pulse">
                    <div class="h-4 bg-slate-200 dark:bg-[#2B3139] rounded w-1/2 mb-4"></div>
                    <div class="h-8 bg-slate-200 dark:bg-[#2B3139] rounded w-3/4"></div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="relative w-full md:w-96 group">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 focus-within:text-white transition-colors"></i>
                    <input type="text" id="coin-search" placeholder="Search markets..." 
                        class="w-full bg-white dark:bg-[#1E2329] border border-slate-200 dark:border-dark-border rounded-2xl py-3 pl-12 pr-4 text-sm focus:outline-none transition-all">
                </div>
                <div class="flex gap-2 w-full md:w-auto overflow-x-auto no-scrollbar">
                    <button id="filter-all" class="flex-1 whitespace-nowrap bg-slate-900 dark:bg-white text-white dark:text-slate-900 p-3 px-6 rounded-2xl flex items-center justify-center gap-2 text-sm font-bold shadow-lg transition-all">
                        <i data-lucide="layers" class="w-4 h-4"></i> All Markets
                    </button>
                    <button id="filter-gainers" class="flex-1 whitespace-nowrap bg-white dark:bg-[#1E2329] text-slate-500 border border-slate-200 dark:border-dark-border p-3 px-6 rounded-2xl flex items-center justify-center gap-2 text-sm font-bold transition-all">
                        <i data-lucide="trending-up" class="w-4 h-4"></i> Top Gainers
                    </button>
                </div>
            </div>

            <div class="glass rounded-[32px] overflow-hidden shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-100/50 dark:bg-[#181A20]/80">
                                <th class="p-6 text-xs font-black uppercase tracking-widest text-slate-500">#</th>
                                <th class="p-6 text-xs font-black uppercase tracking-widest text-slate-500">Coin</th>
                                <th class="p-6 text-xs font-black uppercase tracking-widest text-slate-500">Price</th>
                                <th class="p-6 text-xs font-black uppercase tracking-widest text-slate-500 text-right">24h Change</th>
                                <th class="p-6 text-xs font-black uppercase tracking-widest text-slate-500 text-center">Last 7 Days</th>
                                <th class="p-6 text-xs font-black uppercase tracking-widest text-slate-500 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="coin-table-body" class="divide-y divide-slate-200 dark:divide-slate-800">
                            <tr class="animate-pulse">
                                <td colspan="5" class="p-20 text-center text-slate-500 font-medium">Syncing market data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
